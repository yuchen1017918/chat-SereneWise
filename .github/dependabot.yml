version: 2

updates:
  # NPM 依赖自动更新
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - yuchen1017918
    labels:
      - "dependencies"
      - "dependabot"
    commit-message:
      prefix: "chore"

  # GitHub Actions 自动更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"